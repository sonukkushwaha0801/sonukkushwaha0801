<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 210" width="480" height="210" role="img" aria-label="Sonu Kumar Kushwaha's GitHub Stats">
<title>Sonu Kumar Kushwaha — GitHub Stats</title>
<defs>
<style type="text/css"><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes popNum{0%{opacity:0;transform:scale(.6)}70%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
@keyframes ringDraw{from{stroke-dashoffset:326.7}to{stroke-dashoffset:98}}
@keyframes iconPulse{0%,100%{opacity:.7}50%{opacity:1}}
.row{opacity:0;animation:slideIn .5s ease-out forwards;transform-box:fill-box;transform-origin:right center}
.num{opacity:0;animation:popNum .5s cubic-bezier(.2,.8,.3,1.3) forwards;transform-box:fill-box;transform-origin:center}
.title{opacity:0;animation:fadeIn .5s ease .1s forwards}
.ring-fg{stroke-dasharray:326.7;stroke-dashoffset:326.7;animation:ringDraw 1.6s .4s cubic-bezier(.3,.8,.3,1) forwards}
.ic{animation:iconPulse 2.4s ease-in-out infinite}
]]></style>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#0a0e1a"/><stop offset="100%" stop-color="#0e1420"/>
</linearGradient>
<linearGradient id="borderg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#a855f7" stop-opacity=".4"/>
  <stop offset="100%" stop-color="#22c55e" stop-opacity=".35"/>
</linearGradient>
<linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#a855f7"/>
  <stop offset="55%" stop-color="#4ade80"/>
  <stop offset="100%" stop-color="#38bdf8"/>
</linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<rect x="1" y="1" width="478" height="208" rx="16" fill="url(#bg)" stroke="url(#borderg)" stroke-width="1.4"/>

<text class="title" x="24" y="34" font-size="15" font-weight="700" fill="#e6edf3">📊 Sonu's GitHub Stats</text>
<line x1="24" y1="46" x2="456" y2="46" stroke="#2d2249" stroke-width="1" opacity=".7"/>

<!-- Rank ring: public repos -->
<g transform="translate(96,128)">
  <circle r="52" fill="none" stroke="#1c1a2e" stroke-width="9"/>
  <circle class="ring-fg" r="52" fill="none" stroke="url(#ringGrad)" stroke-width="9" stroke-linecap="round" transform="rotate(-90)" filter="url(#glow)"/>
  <text class="num" x="0" y="-2" text-anchor="middle" font-size="30" font-weight="800" fill="#f3f0fa" style="animation-delay:1.1s">14</text>
  <text x="0" y="20" text-anchor="middle" font-size="10.5" letter-spacing="1.5" fill="#9aa4b2">PUBLIC REPOS</text>
</g>

<!-- Stat rows -->
<g font-size="13.5">
  <g class="row ic" style="animation-delay:.5s">
    <text x="200" y="76" fill="#fde047">⭐</text>
    <text x="226" y="76" fill="#cdd3dd">Total Stars Earned</text>
    <text x="440" y="76" text-anchor="end" font-weight="700" fill="#fde047" filter="url(#glow)">2</text>
  </g>
  <g class="row ic" style="animation-delay:.68s">
    <text x="200" y="104" fill="#38bdf8">👥</text>
    <text x="226" y="104" fill="#cdd3dd">Followers</text>
    <text x="440" y="104" text-anchor="end" font-weight="700" fill="#38bdf8" filter="url(#glow)">7</text>
  </g>
  <g class="row ic" style="animation-delay:.86s">
    <text x="200" y="132" fill="#a855f7">➕</text>
    <text x="226" y="132" fill="#cdd3dd">Following</text>
    <text x="440" y="132" text-anchor="end" font-weight="700" fill="#a855f7" filter="url(#glow)">4</text>
  </g>
  <g class="row ic" style="animation-delay:1.04s">
    <text x="200" y="160" fill="#4ade80">🏆</text>
    <text x="226" y="160" fill="#cdd3dd">Achievement Badges</text>
    <text x="440" y="160" text-anchor="end" font-weight="700" fill="#4ade80" filter="url(#glow)">3</text>
  </g>
  <g class="row ic" style="animation-delay:1.22s">
    <text x="200" y="188" fill="#f472b6">📦</text>
    <text x="226" y="188" fill="#cdd3dd">Pull Shark</text>
    <text x="440" y="188" text-anchor="end" font-weight="700" fill="#f472b6" filter="url(#glow)">x2</text>
  </g>
</g>
</svg>
